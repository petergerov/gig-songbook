<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redeem Gig Songbook</title>
  <meta http-equiv="refresh" content="2;url=https://apps.apple.com/redeem?ctx=offercodes&id=6761431533&code=MILENA">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f5f5f7;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 380px;
      width: 100%;
    }

    .icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin: 0 auto 24px;
      display: block;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: #a1a1a6;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .code-badge {
      display: inline-block;
      background: #1c1c1e;
      border: 1px solid #3a3a3c;
      border-radius: 12px;
      padding: 14px 28px;
      margin-bottom: 32px;
    }

    .code-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6e6e73;
      margin-bottom: 4px;
    }

    .code-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #f5f5f7;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      background: #0071e3;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
      margin-bottom: 16px;
    }

    .btn:active { background: #0051a8; }

    .note {
      font-size: 13px;
      color: #6e6e73;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon" src="AppIcon.png" alt="Gig Songbook">
    <h1>You're invited!</h1>
    <p class="subtitle">Redeem your free copy of<br><strong>Gig Songbook</strong> on the App Store.</p>

    <div class="code-badge">
      <div class="code-label">Promo code</div>
      <div class="code-value">MILENA</div>
    </div>

    <a class="btn" href="https://apps.apple.com/redeem?ctx=offercodes&id=6761431533&code=MILENA">
      Redeem on App Store
    </a>
    <p class="note">Redirecting automatically&hellip;</p>
  </div>
</body>
</html>
